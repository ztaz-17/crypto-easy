<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --accent: #58a6ff;
      --green: #3fb950;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 720px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: rgba(63, 185, 80, 0.15);
      color: var(--green);
      padding: 0.35rem 1rem;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.2rem;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 1.1rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      text-align: left;
      margin-bottom: 2rem;
    }
    .feature {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      font-size: 0.95rem;
    }
    .feature::before {
      content: "✅ ";
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 3rem;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88, 166, 255, 0.3);
    }
    .form-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .form-container iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .features { grid-template-columns: 1fr; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🎁 Бесплатно</div>
    <h1>5 <span>ошибок новичка</span> в крипте</h1>
    <p class="subtitle">
      Самые частые ошибки, которые сливают депозиты новичков.<br>
      Узнай их до того, как потеряешь деньги.
    </p>

    <div class="features">
      <div class="feature">Почему теряют seed-фразу</div>
      <div class="feature">Как не попасть на скам</div>
      <div class="feature">Ошибки при выборе биржи</div>
      <div class="feature">Комиссии которые съедают прибыль</div>
    </div>

    <a class="btn" href="https://forms.gle/vNuTk45g3Tw84fV69" target="_blank">
      📥 Получить гайд бесплатно
    </a>

    <div class="form-container">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScApNqj_oF5mzQLQYjRGqAr0PnMS_LFpx_EFRLSUSIMV0GAtA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Загрузка…</iframe>
    </div>
  </div>
</body>
</html>

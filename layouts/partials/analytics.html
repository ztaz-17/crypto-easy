<!-- GA4 -->
{{ with site.Params.analytics.ga4 }}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ . }}');

  // Track Bybit referral link clicks
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (link && link.href && link.href.includes('bybit.com/invite')) {
      gtag('event', 'click', {
        'event_category': 'outbound',
        'event_label': 'bybit_referral',
        'link_url': link.href
      });
    }

    // Track free-guide CTA clicks
    if (link && link.href && link.href.match(/\/free-guide\/?$/)) {
      gtag('event', 'click', {
        'event_category': 'cta',
        'event_label': 'free_guide',
        'link_url': link.href
      });
    }
  });
</script>
{{ end }}

<!-- Yandex.Metrica -->
{{ with site.Params.analytics.yandexMetrica }}
<script type="text/javascript">
   (function(m,e,t,r,i,k,a){
       m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
       m[i].l=1*new Date();
       k=e.createElement(t),a=e.getElementsByTagName(t)[0],
       k.async=1;k.src=r;a.parentNode.insertBefore(k,a)
   })(window, document,'script',
   'https://mc.yandex.ru/metrika/tag.js', 'ym');

   ym({{ . }}, 'init', {
        clickmap:true,
        trackLinks:true,
        accurateTrackBounce:true
   });
</script>
<noscript>
  <div>
    <img src="https://mc.yandex.ru/watch/{{ . }}" style="position:absolute; left:-9999px;" alt="" />
  </div>
</noscript>
{{ end }}

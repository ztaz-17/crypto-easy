<div class="lang-dropdown">
  <button class="lang-btn">
    {{ .Site.Language.LanguageName }}
  </button>

  <div class="lang-menu">

    <!-- все переводы -->
    {{ range .AllTranslations }}
      <a href="{{ .RelPermalink }}">
        {{ .Language.LanguageName }}
      </a>
    {{ end }}

  </div>
</div>
